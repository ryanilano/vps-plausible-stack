name: vps-edge-stack-s

# ---------------------------------------------------------------------------
# S-tier edge stack for IONOS VPS S (2 vCPU / 2 GB / 80 GB).
#   - Caddy (STOCK image) terminates TLS on 80/443 via automatic HTTP-01.
#   - Plausible at stats.yourdomain.example (public; Plausible has its own login + TOTP).
#   - No Authentik, no dashboard, no homelab.example, no DNS-01/custom Caddy build.
# mem_limit values are CEILINGS, not reservations; pair with the 4 GB swapfile
# bootstrap creates (swap > RAM here, deliberately, to absorb the ClickHouse
# first-migration spike on a 2 GB box).
# ---------------------------------------------------------------------------

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  proxy:
    driver: bridge
  plausible_internal:
    driver: bridge
    internal: true            # DBs only, no egress

volumes:
  caddy_data:                 # issued certs / ACME account (named volume)
  caddy_config:
  plausible_data:
  plausible_db_data:
  plausible_events_data:

services:
  caddy:
    image: caddy:2-alpine     # stock — HTTP-01, no plugin/build needed
    container_name: caddy
    restart: unless-stopped
    env_file: [.env]          # CADDY_EMAIL
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [proxy]
    mem_limit: 128m
    logging: *default-logging
    depends_on: [plausible]

  # ---- Plausible CE v3.2.1 --------------------------------------------------
  plausible_db:
    image: postgres:16-alpine
    container_name: plausible_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: plausible
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=50"]
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    networks: [plausible_internal]
    mem_limit: 256m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plausible"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 1m

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: plausible_events_db
    restart: unless-stopped
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: 1
    networks: [plausible_internal]
    mem_limit: 1g             # the spiky one; low-resources.xml caps it internally too
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 1m

  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.1
    container_name: plausible
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      TMPDIR: /var/lib/plausible/tmp
      BASE_URL: ${BASE_URL}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      TOTP_VAULT_KEY: ${TOTP_VAULT_KEY}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-true}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@plausible_db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
    volumes:
      - plausible_data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks: [proxy, plausible_internal]
    mem_limit: 512m
    logging: *default-logging
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
